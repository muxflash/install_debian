#### Preseed Debian 12 — muxGnome install automatique
#### user: muxflash / axlmux | DE: GNOME | 1 partition ext4

### Localisation
d-i debian-installer/locale string fr_FR.UTF-8
d-i keyboard-configuration/xkb-keymap select fr
d-i keyboard-configuration/layoutcode string fr
d-i keyboard-configuration/model select Generic 105-key PC (intl.)
d-i keyboard-configuration/toggle select No toggling

### Réseau — DHCP
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string muxgnome
d-i netcfg/get_domain string lan

### Miroir
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i mirror/suite string bookworm

### Horloge
d-i clock-setup/utc boolean true
d-i time/zone string Europe/Paris
d-i clock-setup/ntp boolean true

### Partitionnement — plus grand disque non-amovible via /sys/block/removable
d-i partman/early_command string \
    DISK=$(for d in /sys/block/*/; do \
        name=$(basename $d); \
        [ -d /sys/block/$name/device ] || continue; \
        rem=$(cat /sys/block/$name/removable 2>/dev/null || echo 1); \
        size=$(cat /sys/block/$name/size 2>/dev/null || echo 0); \
        [ "$rem" = "0" ] && [ "$size" -gt 2097152 ] && \
            printf "%012d /dev/%s\n" "$size" "$name"; \
    done | sort -rn | head -1 | awk '{print $2}') ; \
    [ -n "$DISK" ] && debconf-set partman-auto/disk "$DISK" || true ; \
    [ -n "$DISK" ] && debconf-set grub-installer/bootdev "$DISK" || true
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-basicfilesystems/no_swap boolean true
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Utilisateur (pas de root, sudo via muxflash)
d-i passwd/root-login boolean false
d-i passwd/user-fullname string muxflash
d-i passwd/username string muxflash
d-i passwd/user-password password axlmux
d-i passwd/user-password-again password axlmux
d-i passwd/user-default-groups string audio cdrom dip floppy plugdev sudo video

### Paquets — GNOME + SSH
tasksel tasksel/first multiselect gnome-desktop
d-i pkgsel/include string openssh-server curl wget git
d-i pkgsel/update-policy select none
d-i pkgsel/upgrade select full-upgrade

### Grub
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

### Late command
d-i preseed/late_command string \
    cp /cdrom/install.sh /target/home/muxflash/install.sh ; \
    chmod +x /target/home/muxflash/install.sh ; \
    chown 1000:1000 /target/home/muxflash/install.sh ; \
    printf 'muxflash ALL=(ALL) NOPASSWD: ALL\n' > /target/etc/sudoers.d/99-muxflash-setup ; \
    chmod 440 /target/etc/sudoers.d/99-muxflash-setup ; \
    printf 'XKBMODEL="pc105"\nXKBLAYOUT="fr"\nXKBVARIANT=""\nXKBOPTIONS=""\nBACKSPACE="guess"\n' > /target/etc/default/keyboard ; \
    mkdir -p /target/etc/systemd/system ; \
    printf '[Unit]\nDescription=muxpc first-boot install\nAfter=network-online.target\nWants=network-online.target\n\n[Service]\nType=oneshot\nUser=muxflash\nWorkingDirectory=/home/muxflash\nEnvironment=HOME=/home/muxflash\nEnvironment=MUXPC_DE=gnome\nEnvironment=MUXPC_QWEN=n\nEnvironment=MUXPC_OI=y\nEnvironment=GITHUB_TOKEN=PLACEHOLDER_GITHUB_TOKEN\nExecStart=/bin/bash /home/muxflash/install.sh\nExecStartPost=/usr/bin/sudo /bin/systemctl disable muxpc-firstboot.service\nExecStartPost=/bin/rm -f /home/muxflash/install.sh\nExecStartPost=/usr/bin/sudo /bin/rm -f /etc/sudoers.d/99-muxflash-setup\nStandardOutput=journal\nStandardError=journal\nRemainAfterExit=yes\n\n[Install]\nWantedBy=multi-user.target\n' > /target/etc/systemd/system/muxpc-firstboot.service ; \
    mkdir -p /target/etc/systemd/system/multi-user.target.wants ; \
    ln -sf /etc/systemd/system/muxpc-firstboot.service /target/etc/systemd/system/multi-user.target.wants/muxpc-firstboot.service ; \
    in-target systemctl enable ssh || true

### Reboot automatique sans prompt
d-i finish-install/reboot_in_progress note
