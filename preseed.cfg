#### Preseed Debian 12 — muxGnome install automatique
#### user: muxflash / axlmux | DE: GNOME | 1 partition ext4

### Localisation
d-i debian-installer/locale string fr_FR.UTF-8
d-i keyboard-configuration/xkb-keymap select fr
d-i keyboard-configuration/toggle select No toggling

### Réseau — DHCP
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string muxgnome
d-i netcfg/get_domain string lan

### Miroir
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i mirror/suite string bookworm

### Horloge
d-i clock-setup/utc boolean true
d-i time/zone string Europe/Paris
d-i clock-setup/ntp boolean true

### Partitionnement — 1 seule partition ext4 (pas de swap)
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-basicfilesystems/no_swap boolean true
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Utilisateur (pas de root, sudo via muxflash)
d-i passwd/root-login boolean false
d-i passwd/user-fullname string muxflash
d-i passwd/username string muxflash
d-i passwd/user-password password axlmux
d-i passwd/user-password-again password axlmux
d-i passwd/user-default-groups string audio cdrom dip floppy plugdev sudo video

### Paquets — GNOME + SSH
tasksel tasksel/first multiselect gnome-desktop
d-i pkgsel/include string openssh-server curl wget git
d-i pkgsel/update-policy select none
d-i pkgsel/upgrade select full-upgrade

### Grub
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

### Late command — sans heredoc (non supporté par preseed)
d-i preseed/late_command string \
    cp /cdrom/install.sh /target/home/muxflash/install.sh ; \
    chmod +x /target/home/muxflash/install.sh ; \
    chown 1000:1000 /target/home/muxflash/install.sh ; \
    mkdir -p /target/etc/systemd/system ; \
    printf '[Unit]\nDescription=muxpc first-boot install\nAfter=network-online.target\nWants=network-online.target\nConditionPathExists=/home/muxflash/install.sh\n\n[Service]\nType=oneshot\nUser=muxflash\nWorkingDirectory=/home/muxflash\nEnvironment=HOME=/home/muxflash\nEnvironment=MUXPC_DE=gnome\nEnvironment=MUXPC_QWEN=n\nEnvironment=MUXPC_OI=y\nExecStart=/bin/bash /home/muxflash/install.sh\nExecStartPost=/bin/rm -f /home/muxflash/install.sh\nExecStartPost=/bin/systemctl disable muxpc-firstboot.service\nStandardOutput=journal+console\nStandardError=journal+console\n\n[Install]\nWantedBy=multi-user.target\n' > /target/etc/systemd/system/muxpc-firstboot.service ; \
    in-target systemctl enable muxpc-firstboot.service ; \
    in-target systemctl enable ssh

### Reboot automatique sans prompt
d-i finish-install/reboot_in_progress note
